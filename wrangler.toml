name = "dmsignals"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Poll every 2 hours; Haiku-draft + inbox-check + digest email at 13:00 UTC (9am ET)
[triggers]
crons = ["0 */2 * * *", "0 13 * * *"]

[[kv_namespaces]]
binding = "LEADS"
id = "aa7e6d4a4e4c408a8bba24884a86cad9"

[vars]
EMAIL_FROM = "DM Signals <radar@theultimategamemaster.com>"
EMAIL_TO = "joelauge@gmail.com"
INSTANT_HOT = "false"   # "true" = also email immediately when a raw lead scores >= 60

# Secrets (set via `wrangler secret put <NAME>`):
#   REDDIT_CLIENT_ID       app-only browsing
#   REDDIT_CLIENT_SECRET
#   REDDIT_USERNAME        password-grant, needed only for inbox reads
#   REDDIT_PASSWORD
#   ANTHROPIC_API_KEY      Haiku drafting (claude-haiku-4-5-20251001)
#   RESEND_API_KEY
#   ADMIN_KEY              any random string, guards /run and /digest

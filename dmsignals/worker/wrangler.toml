name = "dmsignals"
main = "worker.js"
compatibility_date = "2026-06-01"

# 7:00 AM Toronto = 11:00 UTC during EDT (Mar–Nov), 12:00 UTC during EST.
# Cloudflare cron is UTC-only; adjust twice a year or keep 11:00 year-round (6am in winter).
[triggers]
crons = ["0 11 * * *"]

[[kv_namespaces]]
binding = "SIGNALS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
